<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VPN Scanner Suite</title>
  <style>
    :root {
      --bg: #0d1117;
      --bar: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #2f81f7;
      --accent2: #1f6feb;
      --green: #3fb950;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; }
    body {
      background:
        radial-gradient(1100px 520px at 100% -8%, rgba(47,129,247,.12), transparent 60%),
        radial-gradient(900px 480px at -8% 112%, rgba(63,185,80,.07), transparent 55%),
        var(--bg);
      color: var(--text);
      font-family: Tahoma, "Segoe UI", system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }
    header {
      background: linear-gradient(180deg, rgba(22,27,34,.92), rgba(22,27,34,.78));
      -webkit-backdrop-filter: blur(10px);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
      box-shadow: 0 1px 0 rgba(255,255,255,.02), 0 8px 24px -16px rgba(0,0,0,.8);
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 0 16px;
      flex: 0 0 auto;
      position: relative;
      z-index: 5;
    }
    .brand {
      font-weight: 700;
      font-size: 15px;
      margin-left: 18px;
      white-space: nowrap;
      color: var(--text);
      letter-spacing: .2px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .brand .brand-mark {
      font-size: 18px;
      filter: drop-shadow(0 0 8px rgba(47,129,247,.55));
    }
    .brand .brand-text {
      background: linear-gradient(135deg, #58a6ff, #2f81f7);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .tabs { display: flex; gap: 2px; flex: 1; }
    .tab {
      appearance: none;
      background: transparent;
      border: none;
      border-bottom: 3px solid transparent;
      border-radius: 8px 8px 0 0;
      color: var(--muted);
      font: inherit;
      font-size: 14px;
      padding: 14px 18px;
      cursor: pointer;
      transition: color .15s, border-color .15s, background .15s;
      white-space: nowrap;
    }
    .tab:hover { color: var(--text); background: rgba(255,255,255,.035); }
    .tab.active {
      color: var(--text);
      border-bottom-color: var(--accent);
      background: linear-gradient(180deg, rgba(47,129,247,.10), transparent);
      font-weight: 700;
    }
    .tab .dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #6e7681;
      margin-left: 6px;
      vertical-align: middle;
      transition: background .2s, box-shadow .2s;
    }
    .tab.loaded .dot {
      background: var(--green);
      box-shadow: 0 0 0 3px rgba(63,185,80,.18), 0 0 8px rgba(63,185,80,.55);
    }
    main { flex: 1; position: relative; }
    iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      background: var(--bg);
      display: none;
    }
    iframe.active { display: block; }
    .hint {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      color: var(--muted);
      font-size: 14px;
    }
    .hint::before {
      content: "";
      width: 30px; height: 30px;
      border-radius: 50%;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <header>
    <span class="brand"><span class="brand-mark">🛡️</span> <span class="brand-text">VPN Scanner Suite</span></span>
    <nav class="tabs" id="tabs"></nav>
  </header>
  <main id="frames">
    <div class="hint" id="hint">در حال بارگذاری...</div>
  </main>

  <script>
    const SCANNERS = /*__SCANNERS__*/;

    const tabsEl  = document.getElementById('tabs');
    const framesEl = document.getElementById('frames');
    const hintEl  = document.getElementById('hint');

    function activate(id) {
      SCANNERS.forEach(s => {
        const tab   = document.getElementById('tab-' + s.id);
        const frame = document.getElementById('frame-' + s.id);
        const isActive = s.id === id;
        tab.classList.toggle('active', isActive);
        frame.classList.toggle('active', isActive);
        // بارگذاری تنبل: src را فقط وقتی تب اولین بار باز می‌شود ست می‌کنیم
        if (isActive && !frame.src) {
          frame.src = 'http://localhost:' + s.port + '/';
          tab.classList.add('loaded');
          hintEl.style.display = 'none';
        }
      });
      location.hash = id;
    }

    SCANNERS.forEach(s => {
      const tab = document.createElement('button');
      tab.className = 'tab';
      tab.id = 'tab-' + s.id;
      tab.innerHTML = s.name + '<span class="dot"></span>';
      tab.onclick = () => activate(s.id);
      tabsEl.appendChild(tab);

      const frame = document.createElement('iframe');
      frame.id = 'frame-' + s.id;
      frame.title = s.name;
      framesEl.appendChild(frame);
    });

    // تب اولیه: از روی hash آدرس یا اولین اسکنر
    const initial = SCANNERS.find(s => s.id === location.hash.slice(1)) || SCANNERS[0];
    activate(initial.id);
  </script>
</body>
</html>
