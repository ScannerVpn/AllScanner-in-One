<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Surfshark Dashboard</title>
<style>
/* ===== Unified VPN Scanner Suite theme (GitHub-dark) ===== */
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--surface:#161b22;--surface2:#1c2128;--border:#30363d;
  --accent:#2f81f7;--accent2:#1f6feb;--green:#3fb950;--yellow:#d29922;--red:#f85149;
  --text:#e6edf3;--muted:#8b949e;
  --shadow:0 10px 30px -18px rgba(1,4,9,.9);
  color-scheme:dark;
}
body{background:
    radial-gradient(1100px 520px at 100% -8%, rgba(47,129,247,.10), transparent 60%),
    radial-gradient(900px 480px at -8% 112%, rgba(63,185,80,.06), transparent 55%),
    var(--bg);
  background-attachment:fixed;
  color:var(--text);font-family:Tahoma,'Segoe UI',system-ui,sans-serif;
  -webkit-font-smoothing:antialiased;min-height:100vh;padding:20px}

h1{position:relative;display:flex;align-items:center;gap:10px;padding:14px 18px 14px 22px;margin-bottom:16px;border-radius:12px;
  background:linear-gradient(135deg,#11161d,#161b22);box-shadow:var(--shadow);overflow:hidden;
  border:1px solid var(--border);font-size:18px;font-weight:700}
h1::before{content:"";position:absolute;inset-inline-start:0;top:0;bottom:0;width:4px;background:linear-gradient(180deg,var(--accent),var(--accent2))}
h1 .logo{font-size:22px;filter:drop-shadow(0 0 8px rgba(47,129,247,.4))}
#live-badge{font-size:11px;padding:4px 12px;border-radius:20px;font-weight:600;
  background:var(--surface);border:1px solid var(--border);color:var(--muted);margin-inline-start:auto}
#live-badge.ok{background:#102017;border-color:#23863666;color:var(--green);box-shadow:0 0 0 3px rgba(63,185,80,.10)}

.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:16px}
.stat{position:relative;background:linear-gradient(160deg,var(--surface),var(--surface2));border:1px solid var(--border);border-radius:12px;padding:13px 16px;display:flex;flex-direction:column;gap:4px;overflow:hidden;transition:transform .15s,border-color .15s,box-shadow .15s}
.stat::before{content:"";position:absolute;top:0;inset-inline:0;height:2px;background:linear-gradient(90deg,transparent,rgba(47,129,247,.5),transparent);opacity:0;transition:opacity .15s}
.stat:hover{transform:translateY(-2px);border-color:#3d444d;box-shadow:var(--shadow)}
.stat:hover::before{opacity:1}
.stat-label{font-size:11px;color:var(--muted);letter-spacing:.3px}
.stat-val{font-size:22px;font-weight:700}

.filters{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.filters input{padding:8px 12px;border-radius:8px;border:1px solid var(--border);
  background:var(--surface);color:var(--text);font-size:13px;outline:none;width:220px;transition:border-color .15s,box-shadow .15s}
.filters input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(47,129,247,.18)}
.filters input::placeholder{color:var(--muted)}
.filter-btn{padding:6px 13px;border-radius:8px;border:1px solid var(--border);
  background:var(--surface);color:var(--muted);font-size:12px;cursor:pointer;white-space:nowrap;transition:.15s}
.filter-btn:hover{color:var(--text);border-color:#3d444d}
.filter-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:0 2px 10px -2px rgba(47,129,247,.6)}
.ping-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;border:none;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#fff;font-size:13px;font-weight:600;cursor:pointer;box-shadow:0 4px 14px -4px rgba(47,129,247,.55);transition:.15s}
.ping-btn:hover{filter:brightness(1.08);transform:translateY(-1px);box-shadow:0 6px 18px -4px rgba(47,129,247,.65)}
.ping-btn:disabled{opacity:.5;cursor:default;transform:none;box-shadow:none;filter:none}
#ping-progress{font-size:12px;color:var(--muted)}

.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;overflow-x:auto;box-shadow:var(--shadow)}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{padding:10px 14px;text-align:right;background:var(--surface2);color:var(--muted);
  font-size:11px;font-weight:600;letter-spacing:.3px;
  border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10;cursor:pointer;user-select:none;white-space:nowrap}
thead th:hover{color:var(--text)}
thead th.sort-asc::after{content:' ↑'}
thead th.sort-desc::after{content:' ↓'}
tbody tr{border-bottom:1px solid #21262d;transition:.1s;cursor:pointer}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:#1b222b}
td{padding:9px 14px;vertical-align:middle}
td.mono{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:12px;color:var(--muted)}

.proto{display:inline-block;padding:2px 7px;border-radius:6px;font-size:10px;font-weight:600;margin:1px}
.proto-wg{background:#16263d;color:#79c0ff}
.proto-ovpn{background:#102a1a;color:#56d364}
.proto-ike{background:#231a3a;color:#d2a8ff}

/* Modal */
.modal{display:none;position:fixed;inset:0;
  background:rgba(1,4,9,.75);z-index:1000;align-items:center;justify-content:center;padding:20px}
.modal.active{display:flex}
.modal-box{background:var(--surface);border:1px solid var(--border);border-radius:14px;
  width:680px;max-width:95vw;max-height:85vh;display:flex;flex-direction:column;overflow:hidden}
.modal-head{display:flex;align-items:center;justify-content:space-between;
  padding:14px 20px;border-bottom:1px solid var(--border);background:var(--surface2)}
.modal-head h2{font-size:15px;font-weight:700}
.modal-close{cursor:pointer;color:var(--muted);font-size:20px;line-height:1}
.modal-close:hover{color:var(--text)}
.modal-body{overflow-y:auto;padding:16px 20px}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.info-card{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:11px 15px}
.info-card .lbl{font-size:10px;color:var(--muted);letter-spacing:.3px;margin-bottom:4px}
.info-card .val{font-size:14px;font-weight:600}
.ping-small{padding:6px 14px;border-radius:8px;border:1px solid var(--border);
  background:var(--surface);color:var(--text);font-size:12px;cursor:pointer}
.ping-small:hover{background:var(--accent);border-color:var(--accent)}
.warn-box{margin-top:14px;padding:11px 14px;background:var(--surface2);border-radius:8px;
  font-size:12px;color:var(--muted);border:1px solid var(--border)}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:#30363d;border-radius:6px}
::-webkit-scrollbar-track{background:transparent}
</style>
</head>
<body>

<h1>
  <span class="logo">🦈</span>
  Surfshark Server Dashboard
  <span id="live-badge">connecting...</span>
</h1>

<div class="stats">
  <div class="stat"><div class="stat-label">Total Servers</div><div class="stat-val" id="s-total">—</div></div>
  <div class="stat"><div class="stat-label">Countries</div><div class="stat-val" id="s-countries">—</div></div>
  <div class="stat"><div class="stat-label">✓VPN Accessible</div><div class="stat-val" id="s-ok" style="color:var(--green)">—</div></div>
  <div class="stat"><div class="stat-label">⚠ DPI</div><div class="stat-val" id="s-dpi" style="color:var(--yellow)">—</div></div>
  <div class="stat"><div class="stat-label">✕ Blocked</div><div class="stat-val" id="s-blocked" style="color:var(--red)">—</div></div>
</div>

<div class="filters">
  <button class="ping-btn" id="ping-all-btn" onclick="pingAll()">📡 Ping All</button>
  <button class="ping-btn" id="stop-btn" onclick="stopScan()" style="display:none;background:linear-gradient(135deg,#7f1d1d,#991b1b)">⛔ Stop</button>
  <span id="ping-progress"></span>
  <input type="text" id="search" placeholder="🔍 جستجو کشور یا شهر..." oninput="renderTable()">
  <button class="filter-btn active" id="f-all"       onclick="setFilter('all')">همه</button>
  <button class="filter-btn"       id="f-accessible" onclick="setFilter('accessible')">✓VPN</button>
  <button class="filter-btn"       id="f-dpi"        onclick="setFilter('dpi')">⚠DPI</button>
  <button class="filter-btn"       id="f-blocked"    onclick="setFilter('blocked')">✕ بلاک</button>
  <button class="filter-btn"       id="f-unscanned"  onclick="setFilter('unscanned')">اسکن نشده</button>
</div>

<div class="table-wrap">
<table>
  <thead><tr>
    <th onclick="sortBy('hostname')">Hostname</th>
    <th onclick="sortBy('country')">کشور</th>
    <th onclick="sortBy('city')">شهر</th>
    <th onclick="sortBy('ping')">Ping</th>
    <th>پروتکل‌ها</th>
  </tr></thead>
  <tbody id="tbody"></tbody>
</table>
</div>

<div id="modal" class="modal">
  <div class="modal-box">
    <div class="modal-head">
      <h2 id="modal-title">—</h2>
      <button class="ping-small" id="modal-ping-btn" onclick="pingModal()">📡 Ping</button>
      <span class="modal-close" onclick="closeModal()">✕</span>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script>
let allServers = [], pingData = {}, filterMode = 'all', sortCol = 'country', sortDir = 'asc', modalHost = null;

const FLAGS = {
  NL:'🇳🇱',DE:'🇩🇪',GB:'🇬🇧',FR:'🇫🇷',SE:'🇸🇪',CH:'🇨🇭',AT:'🇦🇹',BE:'🇧🇪',DK:'🇩🇰',FI:'🇫🇮',
  NO:'🇳🇴',IT:'🇮🇹',ES:'🇪🇸',PT:'🇵🇹',PL:'🇵🇱',CZ:'🇨🇿',RO:'🇷🇴',HU:'🇭🇺',GR:'🇬🇷',TR:'🇹🇷',
  LV:'🇱🇻',LT:'🇱🇹',EE:'🇪🇪',SK:'🇸🇰',BG:'🇧🇬',HR:'🇭🇷',RS:'🇷🇸',UA:'🇺🇦',MD:'🇲🇩',AL:'🇦🇱',
  IS:'🇮🇸',LU:'🇱🇺',IL:'🇮🇱',US:'🇺🇸',CA:'🇨🇦',JP:'🇯🇵',SG:'🇸🇬',HK:'🇭🇰',KR:'🇰🇷',IN:'🇮🇳',
  TW:'🇹🇼',VN:'🇻🇳',TH:'🇹🇭',MY:'🇲🇾',ID:'🇮🇩',PH:'🇵🇭',AE:'🇦🇪',AU:'🇦🇺',NZ:'🇳🇿',BR:'🇧🇷',
  AR:'🇦🇷',CO:'🇨🇴',CL:'🇨🇱',MX:'🇲🇽',ZA:'🇿🇦',NG:'🇳🇬',
};

function badge(info) {
  if (!info) return '';
  const pm = {tls443:'TLS 443',tls80:'TLS 80',tls1194:'TLS 1194'};
  if (info.vpnAccessible) return ` <span title="${pm[info.method]||info.method}" style="color:var(--green);font-size:10px">✓VPN</span>`;
  if (info.method==='tcp443-syn') return ` <span title="DPI احتمالی" style="color:var(--yellow);font-size:10px">⚠DPI</span>`;
  if (info.ms!=null) return ` <span style="color:var(--red);font-size:10px">✕VPN</span>`;
  return '';
}

function pingColor(ms) {
  if (ms==null) return 'color:var(--muted)';
  return ms<150?'color:var(--green)':ms<300?'color:var(--yellow)':'color:var(--red)';
}

async function fetchServers() {
  try {
    const r = await fetch('/api/servers');
    const d = await r.json();
    allServers = d.servers || [];
    document.getElementById('s-total').textContent     = allServers.length;
    document.getElementById('s-countries').textContent = new Set(allServers.map(s=>s.country)).size;
    document.getElementById('live-badge').textContent  = `✓ ${allServers.length} سرور`;
    document.getElementById('live-badge').className    = 'ok';
    renderTable();
  } catch { document.getElementById('live-badge').textContent = '✕ خطا'; }
}

function setFilter(f) {
  filterMode = f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('f-'+f).classList.add('active');
  renderTable();
}

function sortBy(col) {
  sortDir = sortCol===col ? (sortDir==='asc'?'desc':'asc') : 'asc';
  sortCol = col;
  document.querySelectorAll('thead th').forEach(th=>th.classList.remove('sort-asc','sort-desc'));
  const idx = {hostname:0,country:1,city:2,ping:3};
  if (idx[col]!=null) document.querySelectorAll('thead th')[idx[col]].classList.add('sort-'+sortDir);
  renderTable();
}

function updateStats() {
  const sc = allServers.filter(s=>pingData[s.hostname]);
  document.getElementById('s-ok').textContent      = sc.filter(s=>pingData[s.hostname].vpnAccessible).length || '—';
  document.getElementById('s-dpi').textContent     = sc.filter(s=>pingData[s.hostname].method==='tcp443-syn').length || '—';
  document.getElementById('s-blocked').textContent = sc.filter(s=>pingData[s.hostname]&&!pingData[s.hostname].vpnAccessible&&pingData[s.hostname].method!=='tcp443-syn').length || '—';
}

function renderTable() {
  const q = document.getElementById('search').value.toLowerCase();
  let rows = allServers.filter(s => {
    if (q && !s.country.toLowerCase().includes(q) && !s.city.toLowerCase().includes(q) && !s.hostname.toLowerCase().includes(q)) return false;
    const info = pingData[s.hostname];
    if (filterMode==='accessible') return info?.vpnAccessible===true;
    if (filterMode==='dpi')        return info?.method==='tcp443-syn';
    if (filterMode==='blocked')    return info && !info.vpnAccessible && info.method!=='tcp443-syn';
    if (filterMode==='unscanned')  return !info;
    return true;
  });
  rows.sort((a,b) => {
    if (sortCol==='ping') {
      const va=pingData[a.hostname]?.ms??9999, vb=pingData[b.hostname]?.ms??9999;
      return sortDir==='asc'?va-vb:vb-va;
    }
    const va=a[sortCol]||'', vb=b[sortCol]||'';
    return sortDir==='asc'?va.localeCompare(vb):vb.localeCompare(va);
  });
  updateStats();
  document.getElementById('tbody').innerHTML = rows.map(s => {
    const info = pingData[s.hostname], ms = info?.ms;
    const flag = FLAGS[s.code]||'🌐';
    const pingCell = ms!=null
      ? `<span style="${pingColor(ms)};font-weight:600">${ms}ms${badge(info)}</span>`
      : info ? `<span style="color:var(--red);font-size:11px">timeout${badge(info)}</span>`
             : `<span style="color:var(--muted)">—</span>`;
    return `<tr onclick="openModal('${s.hostname}')">
      <td class="mono">${s.hostname}</td>
      <td>${flag} ${s.country}</td>
      <td>${s.city}</td>
      <td id="pc-${s.hostname.replace(/\./g,'_')}">${pingCell}</td>
      <td>
        <span class="proto proto-wg">WireGuard</span>
        <span class="proto proto-ovpn">OpenVPN</span>
        <span class="proto proto-ike">IKEv2</span>
      </td>
    </tr>`;
  }).join('');
}

let _stopScan = false;

function stopScan() {
  _stopScan = true;
}

async function pingAll() {
  if (document.getElementById('ping-all-btn').disabled) return;
  _stopScan = false;
  const btn  = document.getElementById('ping-all-btn');
  const stop = document.getElementById('stop-btn');
  const prog = document.getElementById('ping-progress');
  btn.disabled = true; btn.textContent = '⏳ در حال اسکن...';
  stop.style.display = 'inline-block';
  const queue = [...allServers]; let done = 0;
  prog.textContent = `0/${queue.length}`;
  const CONCURRENCY = 12;
  async function worker() {
    while (queue.length && !_stopScan) {
      const s = queue.shift();
      try {
        const r = await fetch(`/api/ping?host=${s.hostname}`);
        pingData[s.hostname] = await r.json();
      } catch { pingData[s.hostname] = { ms:null, method:null, vpnAccessible:false }; }
      done++;
      prog.textContent = `${done}/${allServers.length}`;
      const cell = document.getElementById('pc-'+s.hostname.replace(/\./g,'_'));
      if (cell) {
        const info = pingData[s.hostname], ms = info?.ms;
        cell.innerHTML = ms!=null
          ? `<span style="${pingColor(ms)};font-weight:600">${ms}ms${badge(info)}</span>`
          : `<span style="color:var(--red);font-size:11px">timeout${badge(info)}</span>`;
      }
    }
  }
  await Promise.all(Array.from({length:CONCURRENCY}, worker));
  btn.disabled = false; btn.textContent = '📡 Ping All';
  stop.style.display = 'none';
  prog.textContent = _stopScan ? '⛔ متوقف شد' : `✓ ${done} اسکن شد`;
  _stopScan = false;
  setTimeout(() => { prog.textContent = ''; }, 2500);
  renderTable();
}

function openModal(hostname) {
  modalHost = hostname;
  const s = allServers.find(x=>x.hostname===hostname)||{};
  const info = pingData[hostname];
  const flag = FLAGS[s.code]||'🌐';
  document.getElementById('modal-title').textContent = `${flag} ${s.country} — ${s.city}`;
  document.getElementById('modal-body').innerHTML = `
    <div class="info-grid">
      <div class="info-card"><div class="lbl">Hostname</div><div class="val" style="font-size:11px;font-family:monospace">${hostname}</div></div>
      <div class="info-card"><div class="lbl">کشور / شهر</div><div class="val">${flag} ${s.country} — ${s.city}</div></div>
      <div class="info-card"><div class="lbl">Ping</div><div class="val" id="mpv">
        ${info ? (info.ms!=null?`<span style="${pingColor(info.ms)}">${info.ms}ms${badge(info)}</span>`:`<span style="color:var(--red)">timeout${badge(info)}</span>`) : '—'}
      </div></div>
      <div class="info-card"><div class="lbl">روش</div><div class="val" id="mmv" style="font-size:12px">${info?.method||'—'}</div></div>
    </div>
    <div>
      <div style="font-size:12px;color:var(--muted);margin-bottom:8px">پروتکل‌های پشتیبانی‌شده:</div>
      <span class="proto proto-wg">WireGuard</span>
      <span class="proto proto-ovpn">OpenVPN UDP</span>
      <span class="proto proto-ovpn">OpenVPN TCP</span>
      <span class="proto proto-ike">IKEv2</span>
    </div>
    <div class="warn-box">
      🔴 <strong style="color:var(--text)">یادآوری:</strong>
      قبل از ping گرفتن Surfshark رو کاملاً خاموش کن تا نتیجه واقعی باشه.
    </div>`;
  document.getElementById('modal').classList.add('active');
}

async function pingModal() {
  if (!modalHost) return;
  const btn = document.getElementById('modal-ping-btn');
  btn.textContent = '⏳...'; btn.disabled = true;
  try {
    const r = await fetch(`/api/ping?host=${modalHost}`);
    const d = await r.json();
    pingData[modalHost] = d;
    document.getElementById('mpv').innerHTML = d.ms!=null
      ? `<span style="${pingColor(d.ms)}">${d.ms}ms${badge(d)}</span>`
      : `<span style="color:var(--red)">timeout${badge(d)}</span>`;
    document.getElementById('mmv').textContent = d.method||'—';
    const cell = document.getElementById('pc-'+modalHost.replace(/\./g,'_'));
    if (cell) cell.innerHTML = d.ms!=null
      ? `<span style="${pingColor(d.ms)};font-weight:600">${d.ms}ms${badge(d)}</span>`
      : `<span style="color:var(--red);font-size:11px">timeout${badge(d)}</span>`;
    renderTable();
  } catch {}
  btn.textContent = '📡 Ping'; btn.disabled = false;
}

function closeModal() { document.getElementById('modal').classList.remove('active'); }

document.getElementById('modal').addEventListener('click', e => { if (e.target===document.getElementById('modal')) closeModal(); });

fetchServers();
</script>
</body>
</html>
