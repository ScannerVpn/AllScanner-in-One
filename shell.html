<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VPN Scanner Suite</title>
  <style>
    :root {
      --bg: #0d1117;
      --bar: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #2f81f7;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: Tahoma, "Segoe UI", system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }
    header {
      background: var(--bar);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 0 12px;
      flex: 0 0 auto;
    }
    .brand {
      font-weight: 700;
      font-size: 15px;
      margin-left: 16px;
      white-space: nowrap;
      color: var(--accent);
    }
    .tabs { display: flex; gap: 4px; flex: 1; }
    .tab {
      appearance: none;
      background: transparent;
      border: none;
      border-bottom: 3px solid transparent;
      color: var(--muted);
      font: inherit;
      font-size: 14px;
      padding: 14px 18px;
      cursor: pointer;
      transition: color .15s, border-color .15s;
      white-space: nowrap;
    }
    .tab:hover { color: var(--text); }
    .tab.active {
      color: var(--text);
      border-bottom-color: var(--accent);
      font-weight: 700;
    }
    .tab .dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #6e7681;
      margin-left: 6px;
      vertical-align: middle;
    }
    .tab.loaded .dot { background: #3fb950; }
    main { flex: 1; position: relative; }
    iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      background: var(--bg);
      display: none;
    }
    iframe.active { display: block; }
    .hint {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 14px;
    }
  </style>
</head>
<body>
  <header>
    <span class="brand">🛡️ VPN Scanner Suite</span>
    <nav class="tabs" id="tabs"></nav>
  </header>
  <main id="frames">
    <div class="hint" id="hint">در حال بارگذاری...</div>
  </main>

  <script>
    const SCANNERS = /*__SCANNERS__*/;

    const tabsEl  = document.getElementById('tabs');
    const framesEl = document.getElementById('frames');
    const hintEl  = document.getElementById('hint');

    function activate(id) {
      SCANNERS.forEach(s => {
        const tab   = document.getElementById('tab-' + s.id);
        const frame = document.getElementById('frame-' + s.id);
        const isActive = s.id === id;
        tab.classList.toggle('active', isActive);
        frame.classList.toggle('active', isActive);
        // بارگذاری تنبل: src را فقط وقتی تب اولین بار باز می‌شود ست می‌کنیم
        if (isActive && !frame.src) {
          frame.src = 'http://localhost:' + s.port + '/';
          tab.classList.add('loaded');
          hintEl.style.display = 'none';
        }
      });
      location.hash = id;
    }

    SCANNERS.forEach(s => {
      const tab = document.createElement('button');
      tab.className = 'tab';
      tab.id = 'tab-' + s.id;
      tab.innerHTML = s.name + '<span class="dot"></span>';
      tab.onclick = () => activate(s.id);
      tabsEl.appendChild(tab);

      const frame = document.createElement('iframe');
      frame.id = 'frame-' + s.id;
      frame.title = s.name;
      framesEl.appendChild(frame);
    });

    // تب اولیه: از روی hash آدرس یا اولین اسکنر
    const initial = SCANNERS.find(s => s.id === location.hash.slice(1)) || SCANNERS[0];
    activate(initial.id);
  </script>
</body>
</html>
