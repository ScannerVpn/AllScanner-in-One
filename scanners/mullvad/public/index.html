<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mullvad Scanner</title>
  <style>
    /* ===== Unified VPN Scanner Suite theme (GitHub-dark) ===== */
    :root{
      --bg:#0d1117; --surface:#161b22; --surface2:#1c2128; --border:#30363d;
      --text:#e6edf3; --muted:#8b949e;
      --accent:#2f81f7; --accent2:#1f6feb;
      --green:#3fb950; --yellow:#d29922; --red:#f85149;
      --shadow:0 10px 30px -18px rgba(1,4,9,.9);
      color-scheme:dark;
    }
    *{box-sizing:border-box; margin:0; padding:0}
    body{
      background:
        radial-gradient(1100px 520px at 100% -8%, rgba(47,129,247,.10), transparent 60%),
        radial-gradient(900px 480px at -8% 112%, rgba(63,185,80,.06), transparent 55%),
        var(--bg);
      background-attachment:fixed;
      color:var(--text);
      font-family:Tahoma,'Segoe UI',system-ui,sans-serif;
      -webkit-font-smoothing:antialiased;
      min-height:100vh; padding:20px;
    }
    h1{
      position:relative;
      display:flex; align-items:center; gap:10px;
      font-size:18px; font-weight:700; margin-bottom:6px;
      padding:14px 18px 14px 22px; border-radius:12px;
      background:linear-gradient(135deg,#11161d,#161b22);
      border:1px solid var(--border);
      box-shadow:var(--shadow);
      overflow:hidden;
    }
    h1::before{
      content:""; position:absolute; inset-inline-start:0; top:0; bottom:0;
      width:4px; background:linear-gradient(180deg,var(--accent),var(--accent2));
    }
    h1 .logo{font-size:22px; filter:drop-shadow(0 0 8px rgba(47,129,247,.4))}
    .badge-pill{
      margin-inline-start:auto; font-size:11px; font-weight:600;
      padding:4px 12px; border-radius:20px;
      background:var(--surface); border:1px solid var(--border); color:var(--muted);
      transition:.2s;
    }
    .badge-pill.ok{color:var(--green); border-color:#23863666; background:#102017; box-shadow:0 0 0 3px rgba(63,185,80,.10)}
    .sub{color:var(--muted); font-size:13px; margin:0 4px 18px}
    .stats{display:grid; grid-template-columns:repeat(auto-fit,minmax(120px,1fr)); gap:10px; margin-bottom:16px}
    .stat{position:relative; background:linear-gradient(160deg,var(--surface),var(--surface2)); border:1px solid var(--border); border-radius:12px; padding:13px 16px; display:flex; flex-direction:column; gap:4px; overflow:hidden; transition:transform .15s, border-color .15s, box-shadow .15s}
    .stat::before{content:""; position:absolute; top:0; inset-inline:0; height:2px; background:linear-gradient(90deg,transparent,rgba(47,129,247,.5),transparent); opacity:0; transition:opacity .15s}
    .stat:hover{transform:translateY(-2px); border-color:#3d444d; box-shadow:var(--shadow)}
    .stat:hover::before{opacity:1}
    .stat-label{font-size:11px; color:var(--muted); letter-spacing:.3px}
    .stat-val{font-size:22px; font-weight:700}
    .toolbar{display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin-bottom:14px}
    input{background:var(--surface); border:1px solid var(--border); color:var(--text); padding:8px 12px; border-radius:8px; font-size:13px; outline:none; min-width:200px; transition:border-color .15s, box-shadow .15s}
    input:focus{border-color:var(--accent); box-shadow:0 0 0 3px rgba(47,129,247,.18)}
    input::placeholder{color:var(--muted)}
    .btn{display:inline-flex; align-items:center; gap:6px; font-size:13px; font-weight:600; padding:8px 16px; border-radius:8px; border:1px solid var(--border); background:var(--surface); color:var(--text); cursor:pointer; transition:.15s}
    .btn:hover{border-color:var(--accent); background:var(--surface2)}
    .btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2)); border:none; color:#fff; box-shadow:0 4px 14px -4px rgba(47,129,247,.55)}
    .btn-primary:hover{filter:brightness(1.08); transform:translateY(-1px); box-shadow:0 6px 18px -4px rgba(47,129,247,.65)}
    .btn:disabled{opacity:.5; cursor:default; transform:none; box-shadow:none; filter:none}
    .chip{font-size:12px; padding:6px 13px; border-radius:8px; border:1px solid var(--border); background:var(--surface); color:var(--muted); cursor:pointer; transition:.15s; white-space:nowrap}
    .chip:hover{color:var(--text); border-color:#3d444d}
    .chip.active{background:var(--accent); border-color:var(--accent); color:#fff; box-shadow:0 2px 10px -2px rgba(47,129,247,.6)}
    .progress{font-size:12px; color:var(--muted)}
    .table-wrap{background:var(--surface); border:1px solid var(--border); border-radius:12px; overflow:hidden; overflow-x:auto; box-shadow:var(--shadow)}
    table{width:100%; border-collapse:collapse; font-size:13px}
    thead th{padding:10px 14px; text-align:start; background:var(--surface2); color:var(--muted); font-size:11px; font-weight:600; letter-spacing:.3px; border-bottom:1px solid var(--border); position:sticky; top:0; z-index:5; white-space:nowrap}
    tbody td{padding:9px 14px; border-bottom:1px solid #21262d; vertical-align:middle; transition:background .12s}
    tbody tr:last-child td{border-bottom:none}
    tbody tr:hover td{background:#1b222b}
    .ok{color:var(--green)} .bad{color:var(--red)} .warn{color:var(--yellow)} .muted{color:var(--muted)}
    .pill{font-size:11px; padding:2px 8px; border-radius:10px; background:var(--surface2); border:1px solid var(--border); color:var(--text)}
    ::-webkit-scrollbar{width:10px; height:10px}
    ::-webkit-scrollbar-thumb{background:#30363d; border-radius:6px}
    ::-webkit-scrollbar-thumb:hover{background:#3d444d}
    ::-webkit-scrollbar-track{background:transparent}
  </style>
</head>
<body>
  <h1>
    <span class="logo">🐭</span> Mullvad Scanner
    <span id="badge" class="badge-pill">در حال اتصال…</span>
  </h1>
  <div class="sub">اسکنر دسترسی سرورهای Mullvad از پشت DPI</div>

  <div class="stats">
    <div class="stat"><div class="stat-label">کل سرورها</div><div class="stat-val" id="s-total">—</div></div>
    <div class="stat"><div class="stat-label">✓ در دسترس</div><div class="stat-val ok" id="s-ok">—</div></div>
    <div class="stat"><div class="stat-label">⚠ DPI</div><div class="stat-val warn" id="s-dpi">—</div></div>
    <div class="stat"><div class="stat-label">✕ بسته</div><div class="stat-val bad" id="s-bad">—</div></div>
  </div>

  <div class="toolbar">
    <button id="scanBtn" class="btn btn-primary">📡 اسکن همه</button>
    <input id="filter" placeholder="🔍 فیلتر بر اساس کشور / شهر…" />
    <span id="status" class="progress"></span>
    <span style="flex:1"></span>
    <button class="chip active" data-f="all">همه</button>
    <button class="chip" data-f="ok">✓ در دسترس</button>
    <button class="chip" data-f="dpi">⚠ DPI</button>
    <button class="chip" data-f="bad">✕ بسته</button>
    <button class="chip" data-f="unscanned">اسکن‌نشده</button>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr><th>#</th><th>کشور</th><th>شهر</th><th>وضعیت</th><th>روش</th><th>پینگ</th></tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
  </div>

  <script>
    let servers = [];
    const results = {};          // hostname -> { state, ms, method }
    let filterMode = 'all';

    const rowsEl   = document.getElementById('rows');
    const statusEl = document.getElementById('status');
    const scanBtn  = document.getElementById('scanBtn');
    const filterEl = document.getElementById('filter');
    const badgeEl  = document.getElementById('badge');

    async function loadServers() {
      statusEl.textContent = 'در حال بارگذاری سرورها…';
      try {
        const r = await fetch('/api/servers');
        if (!r.ok) throw new Error('network');
        const j = await r.json();
        servers = j.servers || [];
        badgeEl.textContent = '✓ ' + (j.count ?? servers.length) + ' سرور';
        badgeEl.classList.add('ok');
        statusEl.textContent = '';
        render();
      } catch (err) {
        badgeEl.textContent = '✕ خطا';
        statusEl.textContent = 'خطا در دریافت سرورها';
        console.error(err);
      }
    }

    function textMatch(s, q) {
      if (!q) return true;
      return (s.country || '').toLowerCase().includes(q) || (s.city || '').toLowerCase().includes(q);
    }
    function stateMatch(host) {
      if (filterMode === 'all') return true;
      const st = results[host]?.state;
      if (filterMode === 'unscanned') return !st;
      return st === filterMode;
    }

    function updateStats() {
      const vals = Object.values(results);
      document.getElementById('s-total').textContent = servers.length || '—';
      document.getElementById('s-ok').textContent  = vals.filter(v => v.state === 'ok').length  || '—';
      document.getElementById('s-dpi').textContent = vals.filter(v => v.state === 'dpi').length || '—';
      document.getElementById('s-bad').textContent = vals.filter(v => v.state === 'bad').length || '—';
    }

    function statusCell(host) {
      const r = results[host];
      if (!r)              return '<span class="muted">—</span>';
      if (r.state==='ok')  return '<span class="ok">✅ باز</span>';
      if (r.state==='dpi') return '<span class="warn">⚠ DPI</span>';
      if (r.state==='dns') return '<span class="muted">⛔ بدون DNS</span>';
      return '<span class="bad">❌ بسته</span>';
    }

    function render() {
      const q = filterEl.value.trim().toLowerCase();
      rowsEl.innerHTML = '';
      servers
        .filter(s => textMatch(s, q) && stateMatch(s.hostname))
        .forEach((s, i) => {
          const r = results[s.hostname];
          const tr = document.createElement('tr');
          tr.innerHTML =
            '<td class="muted">' + (i + 1) + '</td>' +
            '<td>' + (s.code || '') + ' · ' + (s.country || '') + '</td>' +
            '<td class="muted">' + (s.city || '') + '</td>' +
            '<td id="st-' + s.hostname + '">' + statusCell(s.hostname) + '</td>' +
            '<td id="mt-' + s.hostname + '">' + (r ? '<span class="pill">' + (r.method || '—') + '</span>' : '<span class="muted">—</span>') + '</td>' +
            '<td id="pg-' + s.hostname + '" class="muted">' + (r && r.ms != null ? r.ms + ' ms' : '—') + '</td>';
          rowsEl.appendChild(tr);
        });
    }

    async function pingOne(host) {
      const r = await fetch('/api/ping?host=' + encodeURIComponent(host));
      const j = await r.json();
      let state = 'bad';
      if (j.vpnAccessible) state = 'ok';
      else if (j.ms != null) state = 'dpi';
      else if (j.method === 'dns-fail') state = 'dns';
      results[host] = { state, ms: j.ms, method: j.method };

      const st = document.getElementById('st-' + host);
      const mt = document.getElementById('mt-' + host);
      const pg = document.getElementById('pg-' + host);
      if (st) st.innerHTML = statusCell(host);
      if (mt) mt.innerHTML = '<span class="pill">' + (j.method || '—') + '</span>';
      if (pg) { pg.textContent = j.ms != null ? j.ms + ' ms' : '—'; }
      updateStats();
    }

    async function scanAll() {
      scanBtn.disabled = true;
      const q = filterEl.value.trim().toLowerCase();
      const visible = servers.filter(s => textMatch(s, q));
      let done = 0;
      const queue = [...visible];
      async function worker() {
        while (queue.length) {
          const s = queue.shift();
          try { await pingOne(s.hostname); } catch {}
          statusEl.textContent = (++done) + '/' + visible.length + ' اسکن شد';
        }
      }
      await Promise.all(Array.from({ length: 8 }, worker));
      scanBtn.disabled = false;
      setTimeout(() => { statusEl.textContent = ''; }, 2500);
      if (filterMode !== 'all') render();
    }

    document.querySelectorAll('.chip').forEach(c => c.addEventListener('click', () => {
      document.querySelectorAll('.chip').forEach(x => x.classList.remove('active'));
      c.classList.add('active');
      filterMode = c.dataset.f;
      render();
    }));
    scanBtn.addEventListener('click', scanAll);
    filterEl.addEventListener('input', render);
    loadServers();
  </script>
</body>
</html>
